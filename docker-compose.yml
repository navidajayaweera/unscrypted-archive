services:
  archive:
    build: .
    container_name: archive-app
    restart: unless-stopped
    ports:
      - "3001:3000"        # Change 3001 if that port is taken on your VPS
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/archive.db
      - PORT=3000
    volumes:
      - archive-db:/app/data            # SQLite database persists here
      - archive-uploads:/app/public/uploads  # Uploaded files persist here
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/stats', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  archive-db:
  archive-uploads:
